name: Reusable Backend Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      build_type:
        required: true
        type: string # 'maven' or 'gradle'
      docker_context:
        required: true
        type: string
      docker_file:
        required: true
        type: string
      docker_image_name:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: '21'

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java_version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          cache: ${{ inputs.build_type }}

      - name: Build with ${{ inputs.build_type }}
        working-directory: ${{ inputs.service_path }}
        run: |
          if [ "${{ inputs.build_type }}" == "maven" ]; then
            ./mvnw clean package -DskipTests
          else
            ./gradlew clean build -x test
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-jar
          path: |
            ${{ inputs.service_path }}/target/*.jar
            ${{ inputs.service_path }}/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1

  docker-build-push:
    needs: build-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-jar
          path: ${{ inputs.service_path }}/ci-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.docker_image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.docker_file }}
          push: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=ci-artifacts/*.jar
